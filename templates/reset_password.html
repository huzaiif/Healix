{% extends "base.html" %}

{% block content %}
<script>
    // Supabase often returns tokens in the URL fragment (#). Flask cannot read fragments.
    // This script converts the fragment into query parameters and reloads the page.
    if (window.location.hash && window.location.hash.includes('access_token')) {
        window.location.replace(window.location.href.replace('#', '?'));
    }
</script>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Set New Password</h2>
            <p>Please enter your new password below.</p>
        </div>
        <form method="POST" action="{{ url_for('reset_password') }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="Enter new password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Update Password <i class="fas fa-check"></i></button>
        </form>
    </div>
</div>
{% endblock %}
