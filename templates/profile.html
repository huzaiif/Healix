{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2><i class="fas fa-user-circle"></i> Health Profile</h2>
    <p>Manage your baseline medical information</p>
</div>

<div class="profile-card">
    <form method="POST" action="{{ url_for('profile') }}">
        <div class="form-grid">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" class="form-control" value="{{ record.get('age', '') }}" required>
            </div>
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" step="0.1" id="weight" name="weight" class="form-control" value="{{ record.get('weight', '') }}" required>
            </div>
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" step="0.1" id="height" name="height" class="form-control" value="{{ record.get('height', '') }}" required>
            </div>
        </div>
        
        <div class="form-group mt-3">
            <label for="conditions">Pre-existing Medical Conditions</label>
            <textarea id="conditions" name="conditions" class="form-control" rows="3" placeholder="E.g., Hypertension, Asthma...">{{ record.get('medical_conditions', '') }}</textarea>
        </div>
        
        <div class="form-group mt-3">
            <label for="allergies">Known Allergies</label>
            <textarea id="allergies" name="allergies" class="form-control" rows="3" placeholder="E.g., Peanuts, Penicillin...">{{ record.get('allergies', '') }}</textarea>
        </div>
        
        <div class="form-actions mt-4">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Profile</button>
        </div>
    </form>
</div>
{% endblock %}
